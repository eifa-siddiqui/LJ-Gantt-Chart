<template>
    <div class={wrapperClass}>
        <div class="gantt-header">
            <div class="header-left">
                <h2 class="header-title">{displayTitle}</h2>
                <template if:true={recordName}>
                    <p class="header-subtitle">{recordName}</p>
                </template>
            </div>
            <div class="header-actions">
                <button class="btn-action" onclick={toggleScope} title={scopeButtonLabel}>
                    {scopeButtonLabel}
                </button>
                <button class="btn-action" onclick={toggleExpandCollapseAll} disabled={disableHierarchyActions}>
                    {hierarchyButtonLabel}
                </button>
                <div class="separator"></div>
                <button class="btn-today" onclick={scrollToToday}>
                    <span class="today-dot"></span>
                    Today
                </button>
                <div class="separator"></div>
                <select class="scale-select" onchange={handleScaleChange}>
                    <template for:each={scaleSelectOptions} for:item="option">
                        <option key={option.value} value={option.value} selected={option.selected}>{option.label}</option>
                    </template>
                </select>
                <div class="separator"></div>
                <button class="btn-action" onclick={exportChartAsJPG}>Export</button>
                <button class="btn-action btn-icon-only" onclick={toggleFullscreen} title={fullscreenLabel}>
                    {fullscreenButtonSymbol}
                </button>
                <button class="btn-action" onclick={reloadChart}>Refresh</button>
                <button class="btn-action" onclick={undoLastChange} disabled={disableUndo}>Undo</button>
            </div>
        </div>

        <template if:true={errorMessage}>
            <div class="error-banner">
                <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
                {errorMessage}
            </div>
        </template>

        <div class="filter-bar">
            <div class="filter-group filter-search-group">
                <label class="filter-label">Search:</label>
                <div class="search-shell">
                    <input
                        type="text"
                        class="filter-search"
                        placeholder="Find task..."
                        value={searchTerm}
                        oninput={handleSearchInput} />
                    <template if:true={hasSearchTerm}>
                        <button class="btn-search-clear" onclick={handleSearchClear} title="Clear search">
                            &times;
                        </button>
                    </template>
                </div>
                <template if:true={hasSearchTerm}>
                    <span class="search-result-count">{searchResultInfo}</span>
                </template>
            </div>
            <div class="filter-group">
                <label class="filter-label">Status:</label>
                <select class="filter-select" onchange={handleStatusFilterChange}>
                    <template for:each={statusSelectOptions} for:item="option">
                        <option key={option.value} value={option.value} selected={option.selected}>{option.label}</option>
                    </template>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Owner:</label>
                <select class="filter-select" onchange={handleOwnerFilterChange}>
                    <template for:each={ownerSelectOptions} for:item="option">
                        <option key={option.value} value={option.value} selected={option.selected}>{option.label}</option>
                    </template>
                </select>
            </div>
        </div>

        <template if:true={isLoading}>
            <div class="loading-overlay">
                <div class="spinner"></div>
                Loading project schedule...
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="gantt-content">
                <div class="gantt-sidebar">
                    <div class="gantt-table-header">
                        <div class="header-col name-col">Name</div>
                        <div class="header-col duration-col">Duration</div>
                        <div class="header-col owner-col">Owner</div>
                    </div>
                    <div class="gantt-table-body" onscroll={syncSidebarScroll}>
                        <template if:false={hasData}>
                            <div class="empty-state">
                                <span class="empty-icon">[]</span>
                                <span>No records found</span>
                            </div>
                        </template>

                        <template for:each={level1Data} for:item="l1">
                            <div
                                key={l1.record.Id}
                                class={l1.rowClass}
                                onclick={toggleLevel1}
                                data-id={l1.record.Id}>
                                <template if:true={l1.children}>
                                    <template if:true={supportsLevel2}>
                                        <span class={l1.iconClass}>&#9654;</span>
                                    </template>
                                </template>
                                <lightning-icon
                                    icon-name="utility:record"
                                    size="xx-small"
                                    style="flex-shrink:0;">
                                </lightning-icon>
                                <div class="name-cell">
                                    <span
                                        class="l1-name-link slds-truncate"
                                        onclick={handleLevel1Click}
                                        data-id={l1.record.Id}
                                        title={l1.record.Name}>
                                        {l1.record.Name}
                                    </span>
                                </div>
                                <span class="duration-text">{l1.duration}</span>
                                <span class="owner-text slds-truncate" title={l1.ownerName}>{l1.ownerName}</span>
                            </div>

                            <template if:true={l1.expanded}>
                                <template for:each={l1.children} for:item="l2">
                                    <div
                                        key={l2.record.Id}
                                        class={l2.rowClass}
                                        onclick={handleLevel2Toggle}
                                        data-id={l2.record.Id}
                                        data-parent={l1.record.Id}>
                                        <template if:true={l2.children}>
                                            <template if:true={supportsLevel3}>
                                                <span class={l2.iconClass}>&#9654;</span>
                                            </template>
                                        </template>
                                        <div class="name-cell">
                                            <span
                                                class="slds-truncate"
                                                onclick={handleItemClick}
                                                data-id={l2.record.Id}
                                                data-level="2"
                                                title={l2.record.Name}>
                                                {l2.record.Name}
                                            </span>
                                        </div>
                                        <span class="duration-text">{l2.duration}</span>
                                        <span class="owner-text slds-truncate" title={l2.ownerName}>{l2.ownerName}</span>
                                    </div>

                                    <template if:true={l2.expanded}>
                                        <template for:each={l2.children} for:item="l3">
                                            <div
                                                key={l3.record.Id}
                                                class={l3.rowClass}
                                                onclick={handleItemClick}
                                                data-id={l3.record.Id}
                                                data-level="3">
                                                <div class="name-cell">
                                                    <span class="slds-truncate" title={l3.record.Name}>{l3.record.Name}</span>
                                                </div>
                                                <span class="duration-text">{l3.duration}</span>
                                                <span class="owner-text slds-truncate" title={l3.ownerName}>{l3.ownerName}</span>
                                            </div>
                                        </template>
                                    </template>
                                </template>
                            </template>
                        </template>
                    </div>
                </div>

                <div class="gantt-timeline-container">
                    <div class="timeline-header-scroll">
                        <template for:each={timelineMonths} for:item="month">
                            <div key={month.label} class={month.cellClass}>
                                {month.label}
                            </div>
                        </template>
                    </div>

                    <div class="timeline-body-viewport" onscroll={syncScroll}>
                        <div class="timeline-body-scroll">
                            <div class="today-line" style={todayLineStyle}>
                                <span class="today-line-label">{todayLabel}</span>
                            </div>
                            <div class="project-end-line"></div>

                            <template for:each={level1Data} for:item="l1">
                                <div key={l1.record.Id} class="timeline-row-parent">
                                    <div class="gantt-bar-plan" style={l1.plannedBarStyle} data-element="planned-bar"></div>
                                    <div class={l1.barClass} style={l1.barStyle} data-element="actual-bar" onmousedown={handleBarDragStart} onclick={handleLevel1Click} onmouseenter={handleBarHover} onmousemove={handleBarMove} onmouseleave={hideTooltip} data-id={l1.record.Id} data-level="1">
                                        <div class={l1.fillClass} data-element="progress-fill">
                                            <span class="progress-label">{l1.progressLabel}</span>
                                        </div>
                                    </div>
                                    <div
                                        class="target-end-pin"
                                        style={l1.targetEndStyle}
                                        onmouseenter={handleTargetHover}
                                        onmouseover={handleTargetHover}
                                        onmousemove={handleTargetMove}
                                        onmouseleave={hideTooltip}
                                        onmouseout={hideTooltip}
                                        data-id={l1.record.Id}
                                        data-level="1">
                                    </div>
                                </div>

                                <template if:true={l1.expanded}>
                                    <template for:each={l1.children} for:item="l2">
                                        <div key={l2.record.Id} class="timeline-row-child">
                                            <div class="gantt-bar-plan" style={l2.plannedBarStyle} data-element="planned-bar"></div>
                                            <div
                                                class={l2.barClass}
                                                style={l2.barStyle}
                                                onmousedown={handleBarDragStart}
                                                onclick={handleItemClick}
                                                onmouseenter={handleBarHover}
                                                onmousemove={handleBarMove}
                                                onmouseleave={hideTooltip}
                                                data-id={l2.record.Id}
                                                data-level="2">
                                                <div class={l2.fillClass} data-element="progress-fill">
                                                    <span class="progress-label">{l2.progressLabel}</span>
                                                </div>
                                            </div>
                                            <div
                                                class="target-end-pin"
                                                style={l2.targetEndStyle}
                                                onmouseenter={handleTargetHover}
                                                onmouseover={handleTargetHover}
                                                onmousemove={handleTargetMove}
                                                onmouseleave={hideTooltip}
                                                onmouseout={hideTooltip}
                                                data-id={l2.record.Id}
                                                data-level="2">
                                            </div>
                                        </div>

                                        <template if:true={l2.expanded}>
                                            <template for:each={l2.children} for:item="l3">
                                                <div key={l3.record.Id} class="timeline-row-l3">
                                                    <div class="gantt-bar-plan" style={l3.plannedBarStyle} data-element="planned-bar"></div>
                                                    <div
                                                        class={l3.barClass}
                                                        style={l3.barStyle}
                                                        onmousedown={handleBarDragStart}
                                                        onclick={handleItemClick}
                                                        onmouseenter={handleBarHover}
                                                        onmousemove={handleBarMove}
                                                        onmouseleave={hideTooltip}
                                                        data-id={l3.record.Id}
                                                        data-level="3">
                                                        <div class={l3.fillClass} data-element="progress-fill">
                                                            <span class="progress-label">{l3.progressLabel}</span>
                                                        </div>
                                                    </div>
                                                    <div
                                                        class="target-end-pin"
                                                        style={l3.targetEndStyle}
                                                        onmouseenter={handleTargetHover}
                                                        onmouseover={handleTargetHover}
                                                        onmousemove={handleTargetMove}
                                                        onmouseleave={hideTooltip}
                                                        onmouseout={hideTooltip}
                                                        data-id={l3.record.Id}
                                                        data-level="3">
                                                    </div>
                                                </div>
                                            </template>
                                        </template>
                                    </template>
                                </template>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <template if:true={tooltipVisible}>
            <div class="bar-tooltip">
                <div class="tooltip-title">{tooltipTitle}</div>
                <template for:each={tooltipDetails} for:item="detail">
                    <div key={detail.key} class="tooltip-row">
                        <span class="tooltip-label">{detail.label}</span>
                        <span class="tooltip-value">{detail.value}</span>
                    </div>
                </template>
            </div>
        </template>

        <template if:true={dragConfirm.visible}>
            <div class="modal-backdrop" onclick={cancelDragConfirm}>
                <div class="modal-box" onclick={stopPropagation}>
                    <div class="modal-header">
                        <div class="modal-title-wrap">
                            <span class="modal-title">Confirm Schedule Change</span>
                            <span class="modal-subtitle">{dragConfirm.itemLabel}</span>
                        </div>
                        <div class="modal-header-actions">
                            <button class="modal-close-btn" onclick={cancelDragConfirm} title="Close">&times;</button>
                        </div>
                    </div>
                    <div class="modal-body">
                        <div class="confirm-grid">
                            <div class="confirm-grid-head">Field</div>
                            <div class="confirm-grid-head">Before</div>
                            <div class="confirm-grid-head">After</div>
                            <template for:each={dragConfirm.changes} for:item="change">
                                <div key={change.key} class="confirm-grid-row">
                                    <div class="confirm-grid-label">{change.label}</div>
                                    <div class="confirm-grid-value">{change.before}</div>
                                    <div class="confirm-grid-value">{change.after}</div>
                                </div>
                            </template>
                        </div>
                        <div class="confirm-note">
                            Move this item by {dragConfirm.movedDays} day(s)?
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button class="btn-action" onclick={cancelDragConfirm}>Cancel</button>
                        <button class="btn-action btn-primary" onclick={confirmDragShift}>Confirm</button>
                    </div>
                </div>
            </div>
        </template>

        <template if:true={selectedRecordId}>
            <div class="modal-backdrop" onclick={handleBackdropClick}>
                <div class="modal-box" onclick={stopPropagation}>
                    <div class="modal-header">
                        <div class="modal-title-wrap">
                            <span class="modal-title">{modalTitle}</span>
                        </div>
                        <div class="modal-header-actions">
                            <lightning-button-icon
                                icon-name="utility:edit"
                                alternative-text="Edit"
                                title="Edit"
                                onclick={openEditRecord}
                                disabled={disableEditButton}>
                            </lightning-button-icon>
                            <button class="modal-close-btn" onclick={closeModal} title="Close">&times;</button>
                        </div>
                    </div>
                    <div class="modal-body">
                        <template if:false={isEditMode}>
                            <div class="modal-summary-grid">
                                <template for:each={selectedRecordSummary} for:item="detail">
                                    <div key={detail.key} class="modal-summary-item">
                                        <span class="modal-summary-label">{detail.label}</span>
                                        <span class="modal-summary-value">{detail.value}</span>
                                    </div>
                                </template>
                            </div>
                            <template if:true={hasPopupFields}>
                                <lightning-record-view-form
                                    record-id={selectedRecordId}
                                    object-api-name={selectedObjectApi}>
                                    <div class="modal-fields-grid">
                                        <template for:each={popupFields} for:item="fld">
                                            <div key={fld} class="modal-field-item">
                                                <lightning-output-field field-name={fld}></lightning-output-field>
                                            </div>
                                        </template>
                                    </div>
                                </lightning-record-view-form>
                            </template>
                        </template>
                        <template if:true={isEditMode}>
                            <lightning-record-edit-form
                                class="modal-edit-form"
                                record-id={selectedRecordId}
                                object-api-name={selectedObjectApi}
                                onsubmit={handleInlineEditSubmit}
                                onsuccess={handleInlineEditSuccess}
                                onerror={handleInlineEditError}>
                                <div class="modal-fields-grid">
                                    <template for:each={editFieldList} for:item="fld">
                                        <div key={fld} class="modal-field-item">
                                            <lightning-input-field field-name={fld}></lightning-input-field>
                                        </div>
                                    </template>
                                </div>
                            </lightning-record-edit-form>
                            <div class="modal-actions">
                                <button class="btn-action" onclick={cancelInlineEdit}>Cancel</button>
                                <button class="btn-action btn-primary" onclick={saveInlineEdit}>Save</button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
